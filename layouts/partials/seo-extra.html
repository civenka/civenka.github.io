{{ with .Permalink }}
<link rel="canonical" href="{{ . }}">
{{ end }}
{{ with $.Site.Params.images }}
{{ $image := index . 0 }}
{{ $img := $image }}
{{ if not (hasPrefix $image "http") }}
{{ $img = urls.AbsURL $image }}
{{ end }}
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
{{ end }}
